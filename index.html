<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Requisition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>

<div id="held-item-preview" style="position: fixed; pointer-events: none; z-index: 1000; display: none;"></div>

<body>
    <div id="game-container">
        <header>
            <h1>Rapid Requisition</h1>
            <div id="stats-panel">
                <span>Score: <span id="current-score">0</span></span>
                <button id="btn-start">Start Mission</button>
            </div>
        </header>

        <main id="game-arena" style="position: relative;">
            <!-- Side-by-side logical regions -->
            <div id="ui-layout" style="display: flex; gap: 20px;">
                <canvas id="queue-canvas"></canvas>
                <div id="inventory-stack" style="position: relative;">
                    <canvas id="bg-canvas"></canvas>
                    <canvas id="fg-canvas" style="position: absolute; top:0; left:0;"></canvas>
                </div>
            </div>

            <!-- The Global Overlay: Invisible but captures all movement/ghosting -->
            <canvas id="interaction-canvas" style="position: absolute; top:0; left:0; pointer-events: none;"></canvas>
        </main>

        <aside id="settings-panel">
            <!-- Gear selection and cookies-based settings -->
        </aside>
    </div>
    <script type="module" src="src/main.ts"></script>
</body>

</html>
