<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Requisition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>

<div id="held-item-preview" style="position: fixed; pointer-events: none; z-index: 1000; display: none;"></div>

<body>
    <div id="game-container">
        <header>
            <h1>Rapid Requisition</h1>
            <div id="mission-meta">
                <span id="timer">00:00</span>
                <button id="btn-start">Start Mission</button>
                <button id="btn-extract" style="display: none;">Signal Extraction</button>
            </div>
        </header>

        <main id="ui-layout">
            <!-- Side-by-side logical regions -->
            <div id="game-arena" style="position: relative; display: flex; gap: 25px;">
                <!-- Flecktarn texture: pixelFire, CC BY-SA 3.0, https://commons.wikimedia.org/w/index.php?curid=21884 -->
                <div id="loot-stack" style="position: relative;">
                    <canvas id="loot-bg-canvas"></canvas>
                    <canvas id="loot-fg-canvas" style="position: absolute; top:0; left:0;"></canvas>
                </div>
                <div id="inventory-stack" style="position: relative;">
                    <canvas id="inv-bg-canvas"></canvas>
                    <canvas id="inv-fg-canvas" style="position: absolute; top:0; left:0;"></canvas>
                </div>

                <!-- The Global Overlay: Invisible but captures all movement/ghosting -->
                <canvas id="interaction-canvas"
                    style="position: absolute; top:0; left:0; pointer-events: none;"></canvas>
            </div>

            <aside id="settings-panel">
                <h3>Mission Settings</h3>

                <div class="setting-group">
                    <label for="select-gear">Gear</label>
                    <select id="select-gear"></select>
                </div>

                <div class="setting-group">
                    <label for="select-lootmode">Loot Mode</label>
                    <select id="select-lootmode">
                        <option value="REFILL">Endless Stream (Refill)</option>
                        <option value="LARGE_HAUL">Single Large Haul</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="select-gamemode">Game Mode</label>
                    <select id="select-gamemode">
                        <option value="COUNTDOWN">Countdown — Fill it up!</option>
                        <option value="TIME_ATTACK">Time Attack — Be fast!</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="select-cellsize">Grid Cell Size</label>
                    <select id="select-cellsize">
                        <option value="20">Small (20px)</option>
                        <option value="30" selected>Standard (30px)</option>
                        <option value="40">Large (40px)</option>
                    </select>
                </div>

                <!-- Scoring rules: shown/hidden depending on game mode -->
                <div class="setting-group" id="scoring-options">
                    <label>Scoring Rules</label>

                    <div id="scoring-countdown" class="scoring-subgroup">
                        <label for="select-points-per-cell">Points per Cell Filled</label>
                        <select id="select-points-per-cell">
                            <option value="1">1 pt</option>
                            <option value="2">2 pts</option>
                            <option value="5">5 pts</option>
                        </select>
                        <label for="select-bonus-perfect">Perfect Fill Bonus</label>
                        <select id="select-bonus-perfect">
                            <option value="0">None</option>
                            <option value="50">+50 pts</option>
                            <option value="100">+100 pts</option>
                        </select>
                    </div>

                    <div id="scoring-timeattack" class="scoring-subgroup" style="display: none;">
                        <label for="select-time-bonus">Time Bonus Multiplier</label>
                        <select id="select-time-bonus">
                            <option value="1">None (x1)</option>
                            <option value="2">Fast (x2)</option>
                            <option value="3">Blitz (x3)</option>
                        </select>
                        <label for="select-penalty-rotate">Rotation Penalty</label>
                        <select id="select-penalty-rotate">
                            <option value="0">None</option>
                            <option value="1">-1s per rotate</option>
                            <option value="2">-2s per rotate</option>
                        </select>
                    </div>
                </div>
            </aside>
        </main>
        <footer id="controls-hint">
            <p><strong>Controls:</strong> Left Click (Pick/Drop) | Right Click (Cancel/Return) | Mousewheel, [R],
                [Space] (Rotate)</p>
        </footer>
    </div>
    <script type="module" src="src/main.ts"></script>
</body>

</html>
